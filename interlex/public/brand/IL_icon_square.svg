<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/><stop offset="100%" style="stop-color:#E8C96A"/>
    </linearGradient>
    <linearGradient id="tealI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/><stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>
    <linearGradient id="bridgeI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/><stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="22" fill="#0F2044"/>
  <rect x="3" y="3" width="114" height="114" rx="19" fill="none" stroke="#1A3366" stroke-width="1"/>

  <!-- KZ hexagon left -->
  <polygon points="35,14 57,27 57,52 35,65 13,52 13,27"
           fill="#112244" stroke="url(#goldI)" stroke-width="2"/>
  <!-- KZ Sun rays -->
  <line x1="35" y1="23" x2="35" y2="28" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="51" x2="35" y2="56" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="39" x2="27" y2="39" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  <line x1="43" y1="39" x2="48" y2="39" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="27" x2="29" y2="31" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="41" y1="47" x2="45" y2="51" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="41" y1="27" x2="45" y2="31" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="47" x2="29" y2="51" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="35" cy="39" r="8" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <circle cx="35" cy="39" r="3.5" fill="#C9A84C"/>

  <!-- Bridge -->
  <rect x="59" y="37" width="14" height="5" rx="2.5" fill="url(#bridgeI)" opacity="0.7"/>
  <circle cx="63" cy="39.5" r="2" fill="#C9A84C" opacity="0.7"/>
  <circle cx="69" cy="39.5" r="2" fill="#0D9488" opacity="0.7"/>

  <!-- GE hexagon right -->
  <polygon points="85,14 107,27 107,52 85,65 63,52 63,27"
           fill="#0C2035" stroke="url(#tealI)" stroke-width="2"/>
  <!-- GE Bolnisi Cross -->
  <rect x="83" y="25" width="5" height="28" rx="1.5" fill="#0D9488"/>
  <rect x="74" y="36" width="23" height="5" rx="1.5" fill="#0D9488"/>
  <rect x="76" y="27" width="6" height="6" rx="1" fill="#0D9488" opacity="0.45"/>
  <rect x="89" y="27" width="6" height="6" rx="1" fill="#0D9488" opacity="0.45"/>
  <rect x="76" y="46" width="6" height="6" rx="1" fill="#0D9488" opacity="0.45"/>
  <rect x="89" y="46" width="6" height="6" rx="1" fill="#0D9488" opacity="0.45"/>
  <circle cx="85.5" cy="38.5" r="3" fill="#0F2044"/>
  <circle cx="85.5" cy="38.5" r="1.8" fill="#0D9488"/>

  <!-- Bottom wordmark -->
  <text x="60" y="90" font-family="Georgia,serif" font-size="22" font-weight="700"
        text-anchor="middle" letter-spacing="1" fill="white">INTER</text>
  <text x="60" y="112" font-family="Georgia,serif" font-size="22" font-weight="700"
        text-anchor="middle" letter-spacing="1" fill="url(#goldI)">LEX</text>
</svg>